name: verify

on:
  push:
  pull_request:

jobs:
  public-skeleton:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 scripts/verify_public_skeleton.py
      - run: python3 -m pip install pytest
      - run: python3 -m pytest tests/test_public_skeleton.py -q
