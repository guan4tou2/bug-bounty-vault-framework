id: kb-gitlab-openid-fingerprint

info:
  name: GitLab anonymous fingerprint via openid-configuration
  author: hermes-bb-kb
  severity: info
  description: |
    OIDC discovery confirms GitLab/IdP issuer + endpoints for anonymous fingerprinting. KB: GitLab Anonymous Fingerprinting.
  tags: kb,exposure,catch-all-aware,safe

http:
  - method: GET
    path:
      - "{{BaseURL}}/.well-known/openid-configuration"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        condition: or
        words:
          - '"issuer":"https'
          - '/oauth/token'
          - '/oauth/authorize'
          - 'grant_types_supported'
      - type: word
        part: body
        condition: or
        negative: true
        words:
          - '<!doctype html'
          - '<html'
