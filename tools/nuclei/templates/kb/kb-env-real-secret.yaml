# AUTO-GENERATED by scripts/bb_kb_to_nuclei.py from team KB. GET-only, catch-all-aware.
id: kb-env-real-secret

info:
  name: Exposed .env with real secret (catch-all aware)
  author: hermes-bb-kb
  severity: high
  description: |
    Only fires on REAL secret keys; MIX_/VITE_/public-only .env (xtrachef 教訓) does NOT match.
  tags: kb,exposure,catch-all-aware,safe

http:
  - method: GET
    path:
      - "{{BaseURL}}/.env"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        condition: or
        words:
          - 'DB_PASSWORD='
          - 'DB_PASSWORD ='
          - 'AWS_SECRET'
          - 'AWS_ACCESS_KEY_ID=AKIA'
          - 'APP_KEY=base64:'
          - 'SECRET_KEY='
          - 'PRIVATE_KEY'
          - 'DATABASE_URL=postgres://'
          - 'DATABASE_URL=mysql://'
          - 'MAIL_PASSWORD='
          - 'REDIS_PASSWORD='
      - type: word
        part: body
        condition: or
        negative: true
        words:
          - '<!doctype html'
          - '<html'
          - '<!DOCTYPE html'
