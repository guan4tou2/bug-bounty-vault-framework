# AUTO-GENERATED by scripts/bb_kb_to_nuclei.py from team KB. GET-only, catch-all-aware.
id: kb-npmrc-registry

info:
  name: Exposed .npmrc with registry/_authToken
  author: hermes-bb-kb
  severity: high
  description: |
    Real .npmrc proves npm resolution config (DepConf evidence) or leaks auth token.
  tags: kb,exposure,catch-all-aware,safe

http:
  - method: GET
    path:
      - "{{BaseURL}}/.npmrc"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        condition: or
        words:
          - '_authToken'
          - '//registry.npmjs.org/:_auth'
          - 'registry=http'
      - type: word
        part: body
        condition: or
        negative: true
        words:
          - '<!doctype html'
          - '<html'
