id: kb-git-config-exposed

info:
  name: Exposed .git/config with repo URL (catch-all aware)
  author: hermes-bb-kb
  severity: medium
  description: |
    Requires real git config markers; excludes SPA 200 shell.
  tags: kb,exposure,catch-all-aware,safe

http:
  - method: GET
    path:
      - "{{BaseURL}}/.git/config"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        condition: or
        words:
          - '[core]'
          - '[remote "origin"]'
          - 'url = http'
          - 'url = git@'
      - type: word
        part: body
        condition: or
        negative: true
        words:
          - '<!doctype html'
          - '<html'
