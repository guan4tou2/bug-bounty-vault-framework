# SHAPE-ONLY EXAMPLE — demonstrates Nuclei template STRUCTURE, not a runnable test.
# The redirect_uri variants below are placeholders, NOT real bypass payloads. Real,
# runnable OAuth templates live ONLY in the standalone tool guan4tou2/bbflow
# (nuclei-templates/bb-recon/oauth-redirect-uri.yaml) — never in this architecture-only repo.
id: oauth-redirect-validation-example

info:
  name: OAuth Redirect URI Validation Check (example shape)
  author: bug-bounty-vault
  severity: medium
  description: |
    STRUCTURE EXAMPLE ONLY. Shows how a variable-driven OAuth template is shaped
    (var-parameterised path list + status/word matcher + Location extractor).
    Replace the EXAMPLE redirect variants with real test cases in a PRIVATE toolchain.
  tags: oauth,redirect,misconfig,example-shape
  reference:
    - https://datatracker.ietf.org/doc/html/rfc6749#section-10.6

http:
  - method: GET
    path:
      # placeholder shape only — real bypass variants belong in a private toolchain
      - "{{BaseURL}}/EXAMPLE-oauth-authorize?client_id={{client_id}}&redirect_uri={{redirect_base}}"
      - "{{BaseURL}}/EXAMPLE-oauth-authorize?client_id={{client_id}}&redirect_uri={{redirect_base}}EXAMPLE-variant"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 302

      - type: word
        part: header
        words:
          - "EXAMPLE-consent-marker"
        condition: or

    extractors:
      - type: regex
        part: header
        regex:
          - "Location: (.*)"
