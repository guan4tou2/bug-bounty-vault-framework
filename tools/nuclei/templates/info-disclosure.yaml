# SHAPE-ONLY EXAMPLE — demonstrates Nuclei template STRUCTURE, not a runnable detector.
# All paths/matchers below are placeholders. Real, runnable info-disclosure templates
# (real sensitive paths + secret signatures) live ONLY in the standalone tool
# guan4tou2/bbflow (nuclei-templates/bb-recon/) — never in this architecture-only repo.
id: info-disclosure-common-example

info:
  name: Common Information Disclosure (example shape)
  author: bug-bounty-vault
  severity: low
  description: |
    STRUCTURE EXAMPLE ONLY. Shows the path-list + matchers-condition + word/status
    matcher shape of an info-disclosure template. Replace the EXAMPLE placeholders
    with your own sensitive paths and secret signatures in a PRIVATE toolchain.
  tags: info,disclosure,recon,example-shape

http:
  - method: GET
    path:
      - "{{BaseURL}}/EXAMPLE-sensitive-config-path"
      - "{{BaseURL}}/EXAMPLE-vcs-metadata-path"

    matchers-condition: or
    matchers:
      - type: word
        words:
          - "EXAMPLE_CREDENTIAL_SIGNATURE"
        condition: or

      - type: status
        status:
          - 200
        negative: false
